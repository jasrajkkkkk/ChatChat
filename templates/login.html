<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
  display: flex;
  height: 100vh;
  margin: 0;
  font-family: sans-serif;
}
.left {
  width: 50%;
  background: #e66767;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.right {
  width: 50%;
  background: #2f2f2f;
  color: #ff7675;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
input {
  padding: 10px;
  margin: 10px;
  border-radius: 20px;
  border: none;
}
button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #ff7675;
  color: white;
}
a {
  color: white;
  text-decoration: none;
  border: 1px solid white;
  padding: 8px 20px;
  border-radius: 20px;
}
</style>
</head>

<body>

<div class="left">
  <h2>New here?</h2>
  <a href="/signup">Signup</a>

</div>

<div class="right">
  <h2>Sign In</h2>

  <form method="POST">
    <input name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">LOGIN</button>
  </form>

</div>

</body>
</html>
